# ============================================
# Article Tracker 统一配置文件
# ============================================

# ---------- arXiv 预印本源 ----------
arxiv:
  enabled: true                                    # 是否启用 arXiv 源
  categories: ["cs.CV", "cs.AI", "cs.LG", "cs.CL", "cs.RO"] # arXiv 学科分类
  keywords:                                        # 搜索关键词（与 categories 取 AND/OR）
    - "3D reconstruction"
    - "feed-forward 3D"
    - "dynamic reconstruction"
    - "streaming reconstruction"
    - "Gaussian splatting"
    - "neural radiance field"
    - "NeRF"
    - "SLAM"
    - "LiDAR"
    - "lidar"
  exclude_keywords:                                # 排除关键词
    - "survey"
    - "review"
  logic: "AND"                                     # 关键词逻辑：AND / OR
  max_results: 100                                 # 最大返回论文数
  sort_by: "submittedDate"                         # 排序字段：submittedDate / lastUpdatedDate
  sort_order: "descending"                         # 排序方向：descending / ascending

# ---------- 顶刊正式论文源（Semantic Scholar 主搜索） ----------
top_journal:
  enabled: true                                    # 是否启用顶刊源
  since_days: 7                                    # 回溯天数（1=仅当天）
  max_per_journal: 10                              # 每个期刊最大返回数
  watchlist:                                       # 追踪的期刊家族（内联，无需单独文件）
    ## Q1 顶刊 — 多模态/融合
    - name: "Information Fusion"
    ## Q1 顶刊 — 综述型强刊
    - name: "Artificial Intelligence Review"
    ## Q1 顶刊 — 摄影测量/LiDAR
    - name: "ISPRS Journal of Photogrammetry and Remote Sensing"
    ## Q1 顶刊 — 机器人/工业应用
    - name: "Robotics and Computer-Integrated Manufacturing"
    ## Q1 顶刊 — 图形学核心（4DGS/动态高斯/在线渲染）
    - name: "ACM Transactions on Graphics"
    ## Q1 顶刊 — 3D人体/前馈隐式表示
    - name: "Pattern Recognition"
    ## Q1 顶刊 — 可视化/渲染/三维重建
    - name: "IEEE Transactions on Visualization and Computer Graphics"
    ## Q1 顶刊 — 视觉任务3D重建
    - name: "Image and Vision Computing"
    ## Q1 顶刊 — CV导向3D/多视图/稀疏视角
    - name: "Computer Vision and Image Understanding"
    ## Q1 顶刊 — 3DGS与RGB-D重建综述集中
    - name: "Computational Visual Media"
    ## Q2+ — Eurographics STAR/非刚性3D/前馈综述
    - name: "Computer Graphics Forum"
    ## Q2 — 嵌入式实时3D重建/系统
    - name: "The Visual Computer"
    ## Q2 — NeRF数据增强/渲染成像
    - name: "Journal of Visual Communication and Image Representation"
    ## Q2 — 机器视觉应用3D重建
    - name: "Machine Vision and Applications"
    ## Q2+ — RGB-D视频/医疗NeRF
    - name: "International Journal of Computer Assisted Radiology and Surgery"
    ## Q2 — 神经渲染/文化遗产重建
    - name: "Digital Applications in Archaeology and Cultural Heritage"
    ## Q2 — 图形学系统/动态高斯/NeRF应用
    - name: "Computers and Graphics"
    ## Q1 顶刊 — CV/3D视觉经典
    - name: "International Journal of Computer Vision"
    ## Q1 顶刊 — CV综合
    - name: "IEEE Transactions on Pattern Analysis and Machine Intelligence"
    ## Q1 顶刊 — 机器人/SLAM
    - name: "IEEE Transactions on Robotics"
    - name: "IEEE Robotics and Automation Letters"
    - name: "International Journal of Robotics Research"
    ## 综合保留
    - name: "Nature Machine Intelligence"
    - name: "Science Robotics"

# ---------- 去重策略 ----------
dedup:
  seen_path: ".state/seen.json"                    # 去重状态文件（会提交到仓库，跨次持久化）
  title_threshold: 0.85                            # 标题模糊匹配阈值（0~1，越大越严格）
  prefer_source: "top_journal"                     # 同一篇论文优先保留哪个源的版本

# ---------- 筛选策略（四层分类） ----------
screening:
  output_tiers: ["core", "proxy", "eco"]           # 输出哪些层级（noise 不输出）
  # --- Core：核心领域，高度相关（前3个用于S2搜索） ---
  core_keywords:
    - "3D reconstruction"
    - "feed-forward 3D"
    - "dynamic reconstruction"
    - "streaming reconstruction"
    - "Gaussian splatting"
    - "neural radiance field"
    - "SLAM"
    - "LiDAR"
  # --- Proxy：方法相关但领域不同 ---
  proxy_keywords:
    - "NeRF"
    - "3D Gaussian"
    - "differentiable rendering"
    - "neural rendering"
    - "point cloud"
    - "depth estimation"
    - "multi-view stereo"
    - "structure from motion"
    - "visual odometry"
    - "mesh reconstruction"
    - "signed distance function"
  # --- Eco：领域相关但方法不同 ---
  eco_keywords:
    - "large language model"
    - "scene understanding"
    - "optical flow"
    - "camera pose"
    - "feature matching"
    - "robotics"
    - "autonomous driving"
    - "image synthesis"
    - "voxel"
    - "occupancy network"
  # --- Exclusion：排除关键词 ---
  exclusion_keywords:
    - "survey"
    - "review"
  # --- 必追踪期刊（无论关键词匹配与否，留空则全部按关键词筛选） ---
  must_track_journals: []

# ---------- LLM 双语摘要 ----------
llm:
  enabled: true                                  # 是否启用 LLM（需配 API Key + base_url）
  base_url: "https://api.deepseek.com"           # OpenAI 兼容 API 地址（如 DeepSeek/SiliconFlow）
  model: "deepseek-v4-flash"                      # 模型名称
  max_papers: 20                                  # LLM 最多总结的论文数（节省 API 调用）
  api_key_env: "DS_API_KEY"                        # 从环境变量读取 Key 的变量名
  api_key: ""                                      # 直接填 Key（仅本地测试，勿提交）
  system_prompt_en: |
    You are a senior paper-reading assistant. Based on the given metadata and abstract,
    write ONE concise paragraph in English that covers: research motivation, main method,
    and key experimental findings. Be objective and specific; avoid marketing language.
    Preserve any provided links, but do NOT repeat them in the paragraph.
  system_prompt_zh: |
    你是资深论文阅读助手。基于给定的论文元信息与摘要，用中文写「一段」简洁的总结，
    包含研究动机、核心方法与关键实验结果。保持客观、术语准确；避免营销式表述。
    如有链接请保留，但不要在总结里重复链接。
  timeout: 60                                      # 单篇论文 LLM 请求超时（秒）

# ---------- 输出通道（九通道，每通道独立开关） ----------
output:
  dir: "outputs"                                   # 输出目录
  max_papers: 30                                   # 每次最多推送/输出论文数
  json_enabled: true                               # JSON 输出
  md_enabled: true                                 # Markdown 输出
  pdf_enabled: false                               # PDF 输出（需 weasyprint）
  excel_enabled: false                             # Excel 输出（需 openpyxl）
  html_table_enabled: true                         # HTML 交互表输出
  obsidian_enabled: false                          # Obsidian 笔记输出
  obsidian_vault: ""                               # Obsidian vault 目录
  zotero_enabled: false                            # Zotero 笔记输出
  email:                                           # 邮件推送
    enabled: true                                 # 是否启用
    sender_env: "EMAIL_SENDER"                    # 发件人邮箱环境变量名
    to_env: "EMAIL_TO"                            # 收件人环境变量名（逗号分隔）
    smtp_server: "smtp.qq.com"                    # SMTP 服务器地址
    smtp_port: 465                                # SMTP 端口（465=SSL, 587=STARTTLS）
    smtp_pass_env: "SMTP_PASS"                    # SMTP 密码环境变量名
    tls_mode: "ssl"                               # TLS 模式：ssl / starttls / auto
    subject_prefix: "Paper Tracker"                # 邮件主题前缀
  ghpages:                                         # GitHub Pages 站点
    enabled: true                                 # 是否启用
    output_dir: "docs"                             # 站点输出目录
    keep_runs: 30                                  # 保留历史天数
    accent: "#2563eb"                              # 主题色
    theme_mode: "auto"                             # 主题模式：light / dark / auto

# ---------- 调度 ----------
schedule:
  enabled: true                                   # 是否启用本地定时调度
  cron: "0 23 * * *"                               # cron 表达式（北京时间 07:00 = UTC 23:00 前一天）
  timezone: "Asia/Shanghai"                        # 时区

# ---------- 新鲜度与回退 ----------
freshness:
  since_days: 7                                    # 只看最近 N 天内新论文（1=近24h，3650≈10年全量）
  max_age_days: 365                                # 论文最大年龄（超过则过滤）
  fallback_when_empty: true                        # 当新增不足 fallback_top_n 篇时，补足至该数量（保底）
  fallback_top_n: 10                               # 回退时展示的论文数

# ---------- 外部 API 配置 ----------
s2:                                                # Semantic Scholar（顶刊主搜索源）
  api_key_env: "S2_API_KEY"                        # API Key 环境变量名
  api_key: ""                                      # 直接填 Key（勿提交）
  base_url: "https://api.semanticscholar.org/graph/v1"
openalex:                                          # OpenAlex（补充期刊元数据 + 摘要 fallback）
  email_env: "OPENALEX_EMAIL"                      # 礼貌池邮箱环境变量名
  email: ""                                        # 直接填邮箱（勿提交）
  base_url: "https://api.openalex.org"

# ---------- 运行参数 ----------
source_filter: "all"                               # 源过滤：all / arxiv / top_journal
dry_run: false                                     # 试运行（不产生输出文件）
verbose: false                                     # 详细日志
